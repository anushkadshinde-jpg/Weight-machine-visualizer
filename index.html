<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LED Matrix Audio Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            color: #e5e5e5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        .controls-panel {
            background: rgba(20, 20, 25, 0.85);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        input[type=range] { accent-color: #3b82f6; }

        select {
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23AAAAAA%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right .7rem top 50%;
            background-size: .65rem auto;
        }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen w-screen">

    <!-- Control Panel -->
    <div class="controls-panel w-full md:w-80 h-auto md:h-full p-6 flex flex-col gap-6 overflow-y-auto shrink-0 z-20 shadow-2xl">
        <div>
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500 mb-1">Matrix Visualizer</h1>
            <p class="text-xs text-gray-400">Audio Reactive LED Simulator</p>
        </div>

        <div class="flex flex-col gap-2">
            <button id="micBtn" class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-lg transition-colors border border-blue-500 flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(59,130,246,0.3)]">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                <span id="micBtnText">Enable Audio Reactive Mode</span>
            </button>
            <p class="text-[10px] text-gray-500 text-center">Requires microphone permissions to sync to music</p>
        </div>

        <div class="flex flex-col gap-2">
            <label class="text-sm font-semibold text-gray-300">Pattern Shape</label>
            <select id="patternSelect" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg p-2.5 appearance-none focus:outline-none focus:border-blue-500 transition-colors">
                <option value="spiral">Central Spiral (Fermat)</option>
                <option value="nested_rings">Nested Rings</option>
                <option value="wave">Concentric Wave</option>
                <option value="arms">Galaxy Arms</option>
            </select>
        </div>

        <div class="flex flex-col gap-2">
            <label class="text-sm font-semibold text-gray-300">Color Theme</label>
            <select id="colorSelect" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg p-2.5 appearance-none focus:outline-none focus:border-blue-500 transition-colors">
                <option value="warm">Sunset Glow (Warm)</option>
                <option value="aurora">Aurora Borealis (Cool)</option>
                <option value="fireice">Fire & Ice</option>
                <option value="spectrum">Full Spectrum</option>
                <option value="custom5">Neon Burst</option>
            </select>
        </div>

        <div class="flex flex-col gap-2" id="sequenceWrapper">
            <label class="text-sm font-semibold text-gray-300 flex justify-between">
                <span>Auto Blink Sequence</span>
            </label>
            <select id="sequenceSelect" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg p-2.5 appearance-none focus:outline-none focus:border-blue-500 transition-colors">
                <option value="multi_zone" selected>Multi-Zone (3 Rings)</option>
                <option value="outward">Outward Radial</option>
                <option value="inward">Inward Spiral</option>
                <option value="clockwise">Clockwise Rotation</option>
                <option value="anti_clockwise">Counter-Clockwise</option>
            </select>
        </div>

        <!-- Multi-Zone Config Controls -->
        <div id="multiZoneControls" class="flex flex-col gap-2 p-3 bg-gray-800/50 rounded-lg border border-gray-700">
            <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Multi-Zone Config</label>
            
            <select id="innerZoneSelect" class="w-full bg-gray-800 text-sm text-white border border-gray-700 rounded p-2 appearance-none focus:outline-none focus:border-blue-500">
                <option value="clockwise" selected>Inner: Clockwise</option>
                <option value="anti_clockwise">Inner: Counter-Clockwise</option>
                <option value="outward">Inner: Outward Radial</option>
                <option value="inward">Inner: Inward Spiral</option>
            </select>
            
            <select id="middleZoneSelect" class="w-full bg-gray-800 text-sm text-white border border-gray-700 rounded p-2 appearance-none focus:outline-none focus:border-blue-500">
                <option value="clockwise">Middle: Clockwise</option>
                <option value="anti_clockwise">Middle: Counter-Clockwise</option>
                <option value="outward" selected>Middle: Outward Radial</option>
                <option value="inward">Middle: Inward Spiral</option>
            </select>
            
            <select id="outerZoneSelect" class="w-full bg-gray-800 text-sm text-white border border-gray-700 rounded p-2 appearance-none focus:outline-none focus:border-blue-500">
                <option value="clockwise">Outer: Clockwise</option>
                <option value="anti_clockwise" selected>Outer: Counter-Clockwise</option>
                <option value="outward">Outer: Outward Radial</option>
                <option value="inward">Outer: Inward Spiral</option>
            </select>
        </div>

        <div class="flex flex-col gap-2 mt-2">
            <label class="text-sm font-semibold text-gray-300 flex justify-between">
                <span>LED Density</span>
                <span id="densityVal" class="text-blue-400">5</span>
            </label>
            <input type="range" id="densitySlider" min="1" max="10" value="5" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer">
        </div>

        <div class="flex flex-col gap-2">
            <label class="text-sm font-semibold text-gray-300 flex justify-between">
                <span id="speedLabel">Anim. Speed / Mic Sens.</span>
                <span id="speedVal" class="text-blue-400">Medium</span>
            </label>
            <input type="range" id="speedSlider" min="1" max="100" value="50" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer">
        </div>
        
        <div class="flex flex-col gap-2">
            <label class="text-sm font-semibold text-gray-300 flex justify-between">
                <span>Bulb Size</span>
                <span id="sizeVal" class="text-blue-400">Medium</span>
            </label>
            <input type="range" id="sizeSlider" min="1" max="10" value="5" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer">
        </div>

        <!-- OVERLAY ALIGNMENT CONTROLS -->
        <div class="flex flex-col gap-3 p-3 mt-2 bg-gray-800/50 rounded-lg border border-gray-700">
            <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Overlay Alignment</label>
            
            <div class="flex flex-col gap-1">
                <div class="flex justify-between text-xs text-gray-400"><span>Scale</span><span id="alignScaleVal">54%</span></div>
                <input type="range" id="alignScale" min="10" max="150" value="54" step="0.1" class="w-full h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer">
            </div>
            
            <div class="flex flex-col gap-1">
                <div class="flex justify-between text-xs text-gray-400"><span>X Offset</span><span id="alignXVal">50%</span></div>
                <input type="range" id="alignX" min="0" max="100" value="50" step="0.1" class="w-full h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer">
            </div>
            
            <div class="flex flex-col gap-1">
                <div class="flex justify-between text-xs text-gray-400"><span>Y Offset</span><span id="alignYVal">50%</span></div>
                <input type="range" id="alignY" min="0" max="100" value="50" step="0.1" class="w-full h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer">
            </div>
        </div>

        <div class="mt-auto pt-4 border-t border-gray-800">
            <button id="resetBtn" class="w-full py-2.5 bg-gray-800 hover:bg-gray-700 text-white rounded-lg transition-colors border border-gray-700">
                Randomize Settings
            </button>
        </div>
    </div>

    <!-- Visualization Area -->
    <div class="flex-1 relative w-full h-full flex justify-center items-center overflow-hidden z-10" id="mainContainer">
        <div class="relative w-full h-full flex justify-center items-center" id="imageWrapper">
            <img src="FREDAGAINTEST1.png" id="bgImage" class="max-h-full max-w-full object-contain pointer-events-none z-10" alt="Hardware Background">
            <div id="canvasOverlay" class="absolute rounded-full overflow-hidden z-20" style="display: none; transform: translate(-50%, -50%);">
                <canvas id="visualizerCanvas" class="w-full h-full block"></canvas>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('visualizerCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('mainContainer');
        const bgImage = document.getElementById('bgImage');
        const canvasOverlay = document.getElementById('canvasOverlay');

        // UI Elements
        const patternSelect = document.getElementById('patternSelect');
        const colorSelect = document.getElementById('colorSelect');
        const sequenceSelect = document.getElementById('sequenceSelect');
        const densitySlider = document.getElementById('densitySlider');
        const speedSlider = document.getElementById('speedSlider');
        const sizeSlider = document.getElementById('sizeSlider');
        const resetBtn = document.getElementById('resetBtn');
        const micBtn = document.getElementById('micBtn');
        const micBtnText = document.getElementById('micBtnText');
        const sequenceWrapper = document.getElementById('sequenceWrapper');

        // Alignment UI Elements
        const alignScale = document.getElementById('alignScale');
        const alignX = document.getElementById('alignX');
        const alignY = document.getElementById('alignY');
        const alignScaleVal = document.getElementById('alignScaleVal');
        const alignXVal = document.getElementById('alignXVal');
        const alignYVal = document.getElementById('alignYVal');

        // Multi-zone selectors
        const multiZoneControls = document.getElementById('multiZoneControls');
        const innerZoneSelect = document.getElementById('innerZoneSelect');
        const middleZoneSelect = document.getElementById('middleZoneSelect');
        const outerZoneSelect = document.getElementById('outerZoneSelect');

        // Labels
        const densityVal = document.getElementById('densityVal');
        const speedVal = document.getElementById('speedVal');
        const sizeVal = document.getElementById('sizeVal');
        const speedLabel = document.getElementById('speedLabel');

        // State
        let bulbs = [];
        let animationTime = 0;
        let canvasCenterX = 0;
        let canvasCenterY = 0;
        let maxRadius = 0;

        // Audio State
        let isAudioActive = false;
        let audioContext = null;
        let analyser = null;
        let dataArray = null;
        let source = null;

        // Toggle multi-zone controls visibility
        sequenceSelect.addEventListener('change', (e) => {
            if (e.target.value === 'multi_zone' && !isAudioActive) {
                multiZoneControls.style.display = 'flex';
            } else {
                multiZoneControls.style.display = 'none';
            }
        });

        // Initialize Audio
        async function setupAudio() {
            if (isAudioActive) {
                if (audioContext) audioContext.suspend();
                isAudioActive = false;
                micBtn.classList.replace('bg-green-600', 'bg-blue-600');
                micBtn.classList.replace('hover:bg-green-500', 'hover:bg-blue-500');
                micBtn.classList.replace('border-green-500', 'border-blue-500');
                micBtnText.textContent = "Enable Audio Reactive Mode";
                sequenceWrapper.style.opacity = '1';
                sequenceSelect.disabled = false;
                if (sequenceSelect.value === 'multi_zone') multiZoneControls.style.display = 'flex';
                speedLabel.textContent = "Animation Speed";
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 256;
                    analyser.smoothingTimeConstant = 0.8;
                    const bufferLength = analyser.frequencyBinCount;
                    dataArray = new Uint8Array(bufferLength);
                    source = audioContext.createMediaStreamSource(stream);
                    source.connect(analyser);
                } else if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }

                isAudioActive = true;
                micBtn.classList.replace('bg-blue-600', 'bg-green-600');
                micBtn.classList.replace('hover:bg-blue-500', 'hover:bg-green-500');
                micBtn.classList.replace('border-blue-500', 'border-green-500');
                micBtnText.textContent = "Listening to Audio...";
                sequenceWrapper.style.opacity = '0.4';
                sequenceSelect.disabled = true;
                multiZoneControls.style.display = 'none';
                speedLabel.textContent = "Audio Sensitivity";

            } catch (err) {
                console.error('Error accessing microphone:', err);
                alert('Could not access the microphone. Please ensure permissions are granted.');
            }
        }

        micBtn.addEventListener('click', setupAudio);

        // Sync overlay to image dimensions
        function syncOverlay() {
            const imgWrapper = document.getElementById('imageWrapper');
            const containerW = imgWrapper.clientWidth;
            const containerH = imgWrapper.clientHeight;
            
            let renderedWidth = containerW;
            let renderedHeight = containerH;
            
            if (bgImage && bgImage.complete && bgImage.naturalWidth > 0) {
                const imgRatio = bgImage.naturalWidth / bgImage.naturalHeight;
                const containerRatio = containerW / containerH;
                
                if (containerRatio > imgRatio) {
                    renderedHeight = containerH;
                    renderedWidth = renderedHeight * imgRatio;
                } else {
                    renderedWidth = containerW;
                    renderedHeight = renderedWidth / imgRatio;
                }
            }
            
            const scalePercent = parseFloat(alignScale.value) / 100;
            const leftPercent = parseFloat(alignX.value) / 100;
            const topPercent = parseFloat(alignY.value) / 100;

            const overlayWidth = renderedWidth * scalePercent;
            
            canvasOverlay.style.display = 'block';
            canvasOverlay.style.width = `${overlayWidth}px`;
            canvasOverlay.style.height = `${overlayWidth}px`;
            
            const xOffset = (containerW - renderedWidth) / 2 + (renderedWidth * leftPercent);
            const yOffset = (containerH - renderedHeight) / 2 + (renderedHeight * topPercent);
            
            canvasOverlay.style.left = `${xOffset}px`;
            canvasOverlay.style.top = `${yOffset}px`;

            resizeCanvas();
        }

        function resizeCanvas() {
            if (canvasOverlay.style.display === 'none') return;

            const rect = canvasOverlay.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.style.width = `${rect.width}px`;
            canvas.style.height = `${rect.height}px`;
            
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);
            canvasCenterX = rect.width / 2;
            canvasCenterY = rect.height / 2;
            
            generatePattern();
        }

        window.addEventListener('resize', syncOverlay);
        if (bgImage) bgImage.addEventListener('load', syncOverlay);

        alignScale.addEventListener('input', (e) => {
            alignScaleVal.textContent = `${e.target.value}%`;
            syncOverlay();
        });
        alignX.addEventListener('input', (e) => {
            alignXVal.textContent = `${e.target.value}%`;
            syncOverlay();
        });
        alignY.addEventListener('input', (e) => {
            alignYVal.textContent = `${e.target.value}%`;
            syncOverlay();
        });

        // Core logic: Calculate color based on theme
        function getColor(normalizedDist, angle, theme) {
            let h, s = 90, l = 60;
            switch(theme) {
                case 'warm':
                    h = 60 - (normalizedDist * 60);
                    break;
                case 'aurora':
                    h = 120 + (normalizedDist * 160);
                    break;
                case 'fireice':
                    h = normalizedDist < 0.5 ? 30 : 200;
                    s = 100;
                    break;
                case 'spectrum':
                    h = (angle * 180 / Math.PI + 360) % 360;
                    break;
                case 'custom5':
                    const colors5 = [
                        '255, 0, 0',    // FF0000 Red
                        '5, 255, 0',    // 05FF00 Green
                        '0, 13, 255',   // 000DFF Blue
                        '255, 145, 0',  // FF9100 Orange
                        '255, 0, 234',  // FF00EA Pink
                    ];
                    const idx = Math.min(Math.floor(normalizedDist * 5), 4);
                    return { rgb: colors5[idx] };
                default:
                    h = 0;
            }
            return { h, s, l };
        }

        // Generate the dot matrix
        function generatePattern() {
            bulbs = [];
            const pattern = patternSelect.value;
            const density = parseInt(densitySlider.value);
            const theme = colorSelect.value;
            
            let rawBulbs = [];
            let maxRawDist = 0;

            if (pattern === 'spiral') {
                const numBulbs = 100 + (density * 100);
                const goldenAngle = 137.508 * (Math.PI / 180);
                for (let i = 0; i < numBulbs; i++) {
                    const angle = i * goldenAngle;
                    const r = 5 * Math.sqrt(i);
                    rawBulbs.push({ r, angle });
                    if (r > maxRawDist) maxRawDist = r;
                }
            }
            else if (pattern === 'nested_rings' || pattern === 'wave') {
                const numRings = 4 + (density * 2);
                for (let ring = 1; ring <= numRings; ring++) {
                    const r = ring * 20;
                    const bulbsInRing = ring * 8;
                    for (let i = 0; i < bulbsInRing; i++) {
                        const angle = (i / bulbsInRing) * Math.PI * 2;
                        rawBulbs.push({ r, angle });
                    }
                    if (r > maxRawDist) maxRawDist = r;
                }
            }
            else if (pattern === 'arms') {
                const numArms = 3 + Math.floor(density / 3);
                const bulbsPerArm = 20 + (density * 10);
                for (let arm = 0; arm < numArms; arm++) {
                    const armOffset = (arm / numArms) * Math.PI * 2;
                    for (let i = 0; i < bulbsPerArm; i++) {
                        const t = i / bulbsPerArm;
                        const r = t * 200;
                        const angle = armOffset + (t * Math.PI * 2);
                        const scatter = (Math.random() - 0.5) * 10 * t;
                        rawBulbs.push({ r: r + scatter, angle: angle + (scatter/100) });
                        if (r > maxRawDist) maxRawDist = r;
                    }
                }
            }

            const smallestDimension = Math.min(canvasCenterX * 2, canvasCenterY * 2);
            const targetMaxRadius = (smallestDimension / 2) * 0.90;
            const scaleFactor = targetMaxRadius / (maxRawDist || 1);
            maxRadius = targetMaxRadius;

            bulbs = rawBulbs.map(b => {
                const scaledR = b.r * scaleFactor;
                const normalizedDist = scaledR / targetMaxRadius;
                const color = getColor(normalizedDist, b.angle, theme);
                return {
                    x: Math.cos(b.angle) * scaledR,
                    y: Math.sin(b.angle) * scaledR,
                    dist: scaledR,
                    normalizedDist: normalizedDist,
                    angle: b.angle,
                    color: color
                };
            });
        }

        function calculatePhaseOffset(type, b, isMultiZone = false) {
            const distMulti = isMultiZone ? 10 : 4;
            const angleMulti = isMultiZone ? 3 : 2;
            switch(type) {
                case 'outward': return b.normalizedDist * Math.PI * distMulti;
                case 'inward': return (1 - b.normalizedDist) * Math.PI * distMulti;
                case 'clockwise': return b.angle * angleMulti;
                case 'anti_clockwise': return -b.angle * angleMulti;
                default: return 0;
            }
        }

        // Animation Loop
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const speedMultiplier = parseInt(speedSlider.value) / 50;
            const sequence = sequenceSelect.value;
            const baseBulbSize = parseInt(sizeSlider.value);
            
            if (isAudioActive && analyser) {
                analyser.getByteFrequencyData(dataArray);
            } else {
                animationTime += 0.02 * speedMultiplier;
            }

            ctx.save();
            ctx.translate(canvasCenterX, canvasCenterY);

            for (let i = 0; i < bulbs.length; i++) {
                const b = bulbs[i];
                let intensity = 0;

                if (isAudioActive) {
                    const maxBin = Math.floor(analyser.frequencyBinCount * 0.7);
                    const binIndex = Math.floor(Math.pow(b.normalizedDist, 1.2) * maxBin);
                    const audioVal = dataArray[binIndex] || 0;
                    let normalizedAudio = audioVal / 255;
                    const sensitivity = (parseInt(speedSlider.value) / 50);
                    normalizedAudio *= sensitivity;
                    intensity = normalizedAudio > 0.65 ? 1 : (normalizedAudio > 0.4 ? 0.3 : 0);

                } else {
                    let phaseOffset = 0;
                    if (sequence === 'multi_zone') {
                        if (b.normalizedDist < 0.33) {
                            phaseOffset = calculatePhaseOffset(innerZoneSelect.value, b, true);
                        } else if (b.normalizedDist < 0.66) {
                            phaseOffset = calculatePhaseOffset(middleZoneSelect.value, b, true);
                        } else {
                            phaseOffset = calculatePhaseOffset(outerZoneSelect.value, b, true);
                        }
                    } else {
                        phaseOffset = calculatePhaseOffset(sequence, b, false);
                    }

                    if (patternSelect.value === 'wave') {
                        phaseOffset += Math.sin(b.normalizedDist * Math.PI * 4) * 2;
                    }

                    let rawIntensity = (Math.sin(animationTime - phaseOffset) + 1) / 2;
                    intensity = rawIntensity > 0.8 ? 1 : 0;
                }
                
                const maxBulbRadius = (smallestDim() * 0.005) + (baseBulbSize * 0.5);
                const currentRadius = maxBulbRadius * 0.4 + (maxBulbRadius * 0.6 * intensity);

                // 1. Base 'Off' state (physical dome)
                ctx.beginPath();
                ctx.arc(b.x, b.y, maxBulbRadius * 0.8, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(10, 10, 10, 0.4)`;
                ctx.fill();

                if (intensity > 0.05) {
                    const col = b.color;
                    const shadowStr = col.rgb
                        ? `rgb(${col.rgb})`
                        : `hsl(${col.h}, ${col.s}%, ${col.l}%)`;
                    const fillStr = col.rgb
                        ? `rgba(${col.rgb}, ${intensity * 0.9})`
                        : `hsla(${col.h}, ${col.s}%, ${col.l}%, ${intensity * 0.9})`;

                    // 2. Glow (Shadow)
                    ctx.shadowBlur = 20 * intensity;
                    ctx.shadowColor = shadowStr;

                    // 3. Colored Body
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, currentRadius, 0, Math.PI * 2);
                    ctx.fillStyle = fillStr;
                    ctx.fill();

                    // 4. Bright Core
                    ctx.shadowBlur = 0;
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, currentRadius * 0.4, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${intensity})`;
                    ctx.fill();
                }
            }

            ctx.restore();
            requestAnimationFrame(animate);
        }

        function smallestDim() {
            return Math.min(canvasCenterX * 2, canvasCenterY * 2);
        }

        // Event Listeners
        patternSelect.addEventListener('change', generatePattern);
        colorSelect.addEventListener('change', generatePattern);
        densitySlider.addEventListener('input', (e) => {
            densityVal.textContent = e.target.value;
            generatePattern();
        });
        sizeSlider.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            sizeVal.textContent = val < 4 ? 'Small' : val > 7 ? 'Large' : 'Medium';
        });
        speedSlider.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            if (isAudioActive) {
                speedVal.textContent = val < 30 ? 'Low' : val > 70 ? 'High' : 'Medium';
            } else {
                speedVal.textContent = val < 30 ? 'Slow' : val > 70 ? 'Fast' : 'Medium';
            }
        });

        resetBtn.addEventListener('click', () => {
            const patterns = Array.from(patternSelect.options).map(o => o.value);
            const colors = Array.from(colorSelect.options).map(o => o.value);
            const sequences = Array.from(sequenceSelect.options).map(o => o.value);
            const zoneAnims = ['clockwise', 'anti_clockwise', 'outward', 'inward'];
            
            patternSelect.value = patterns[Math.floor(Math.random() * patterns.length)];
            colorSelect.value = colors[Math.floor(Math.random() * colors.length)];
            sequenceSelect.value = sequences[Math.floor(Math.random() * sequences.length)];
            
            innerZoneSelect.value = zoneAnims[Math.floor(Math.random() * zoneAnims.length)];
            middleZoneSelect.value = zoneAnims[Math.floor(Math.random() * zoneAnims.length)];
            outerZoneSelect.value = zoneAnims[Math.floor(Math.random() * zoneAnims.length)];
            
            sequenceSelect.dispatchEvent(new Event('change'));
            
            densitySlider.value = Math.floor(Math.random() * 8) + 2;
            densityVal.textContent = densitySlider.value;
            
            speedSlider.value = Math.floor(Math.random() * 80) + 10;
            speedVal.dispatchEvent(new Event('input'));
            
            generatePattern();
        });

        // Initialize
        syncOverlay();
        animate();
    </script>
</body>
</html>
